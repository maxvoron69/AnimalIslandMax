# Размер острова
island.width=20
island.height=100

# Длительность одного такта (в миллисекундах)
simulation.tick.delay=1000

# Максимальное количество ходов (0 = бесконечно)
simulation.max.turns=0

# Условие остановки: allDead, maxTurns, manual
simulation.stop.condition=allDead

